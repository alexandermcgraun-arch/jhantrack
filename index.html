<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BillTrack Pro | Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .modal-active { overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        input[type="month"]::-webkit-calendar-picker-indicator { cursor: pointer; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Loading Overlay -->
    <div id="loading-screen" class="fixed inset-0 z-[200] bg-white flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-slate-500 font-medium animate-pulse">Syncing with Cloud...</p>
    </div>

    <!-- Auth Screen -->
    <div id="auth-screen" class="hidden min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden text-center p-10">
            <div class="bg-blue-600 w-20 h-20 rounded-[2rem] flex items-center justify-center mx-auto mb-8 shadow-lg shadow-blue-200 text-white">
                <i data-lucide="wallet" class="w-10 h-10"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-900 mb-2">BillTrack Pro</h1>
            <p class="text-slate-500 mb-10 text-lg">Sign in to manage your finances.</p>
            <button id="btn-login" class="w-full flex items-center justify-center gap-4 bg-white hover:bg-slate-50 text-slate-700 font-bold py-4 px-6 rounded-2xl border-2 border-slate-100 transition-all active:scale-[0.98] shadow-sm">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="w-6 h-6">
                Sign in with Google
            </button>
        </div>
    </div>

    <!-- Main App -->
    <div id="app-container" class="hidden min-h-screen flex text-slate-900">
        
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-slate-200 transform transition-transform duration-300 lg:translate-x-0 -translate-x-full">
            <div class="p-6 flex flex-col h-full">
                <div class="flex items-center gap-3 mb-10">
                    <div class="bg-blue-600 p-2 rounded-xl text-white">
                        <i data-lucide="wallet" class="w-6 h-6"></i>
                    </div>
                    <h1 class="text-xl font-bold tracking-tight">BillTrack</h1>
                </div>

                <nav class="space-y-2 flex-1">
                    <button data-filter="all" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-colors bg-blue-50 text-blue-700">
                        <i data-lucide="calendar" class="w-5 h-5"></i> All Bills
                    </button>
                    <button data-filter="unpaid" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-colors text-slate-600 hover:bg-slate-100">
                        <i data-lucide="clock" class="w-5 h-5"></i> Unpaid
                    </button>
                    <button data-filter="paid" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-colors text-slate-600 hover:bg-slate-100">
                        <i data-lucide="check-circle" class="w-5 h-5"></i> Paid History
                    </button>
                </nav>

                <div class="mt-auto space-y-4 pt-6 border-t border-slate-100">
                    <div class="bg-slate-900 text-white p-4 rounded-2xl">
                        <p class="text-xs text-slate-400 mb-1">Total Unpaid</p>
                        <p id="stat-total-unpaid" class="text-2xl font-bold">₱0.00</p>
                        <div class="mt-4 bg-white/10 rounded-lg p-2 text-xs flex justify-between">
                            <span id="stat-pending-count">0 Pending</span>
                            <span id="stat-overdue-count" class="text-orange-400">0 Overdue</span>
                        </div>
                    </div>

                    <div class="flex items-center gap-3 p-2 bg-slate-50 rounded-2xl">
                        <div id="user-avatar" class="w-10 h-10 rounded-xl bg-slate-200 overflow-hidden flex-shrink-0 flex items-center justify-center text-slate-400">
                            <i data-lucide="user"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p id="user-name" class="text-sm font-bold text-slate-800 truncate">Loading...</p>
                            <button id="btn-logout" class="text-[10px] font-black text-slate-400 hover:text-red-500 uppercase tracking-widest flex items-center gap-1 transition-colors">
                                <i data-lucide="log-out" class="w-3 h-3"></i> Sign Out
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 lg:ml-64 p-4 md:p-8 lg:p-12">
            <header class="flex items-center justify-between mb-8 flex-wrap gap-4">
                <div class="flex items-center gap-4">
                    <button id="btn-menu" class="lg:hidden p-2 hover:bg-slate-200 rounded-lg">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <div>
                        <h2 class="text-2xl font-bold">My Dashboard</h2>
                        <p id="view-indicator" class="text-slate-500 text-sm">Viewing All Bills</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-3">
                    <div id="currency-toggle" class="flex bg-slate-200 p-1 rounded-xl">
                        <button data-curr="USD" class="curr-btn px-3 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-500">USD</button>
                        <button data-curr="PHP" class="curr-btn px-3 py-1.5 rounded-lg text-xs font-bold transition-all bg-white shadow-sm text-blue-600">PHP</button>
                    </div>
                    <button id="btn-add-bill" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-semibold shadow-lg transition-all active:scale-95">
                        <i data-lucide="plus" class="w-5 h-5"></i>
                        <span class="hidden sm:inline">Add Bill</span>
                    </button>
                </div>
            </header>

            <!-- Search & Filters -->
            <div class="mb-6 flex flex-col md:flex-row gap-4 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                <div class="flex-1 relative">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                    <input id="search-input" type="text" placeholder="Search by name..." class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-100 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                </div>
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <i data-lucide="calendar-days" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                        <input id="month-filter" type="month" class="pl-9 pr-4 py-2 bg-slate-50 border border-slate-100 rounded-xl outline-none text-sm appearance-none cursor-pointer">
                    </div>
                    <button id="btn-open-export" class="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-xl text-sm font-bold transition-all">
                        <i data-lucide="download" class="w-4 h-4"></i> Export
                    </button>
                </div>
            </div>

            <!-- List Container -->
            <div id="bill-list" class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden divide-y divide-slate-50">
                <!-- Bills injected here -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <!-- Bill Form Modal -->
    <div id="bill-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden animate-in zoom-in-95 duration-200">
            <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 id="modal-title" class="text-xl font-black">New Bill Entry</h3>
                <button class="modal-close"><i data-lucide="x" class="w-6 h-6 text-slate-400"></i></button>
            </div>
            <form id="bill-form" class="p-8 space-y-5">
                <input type="hidden" id="edit-id">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Description</label>
                    <input id="form-title" required type="text" placeholder="e.g. Meralco / Internet" class="w-full bg-slate-100 border-none rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Amount</label>
                        <input id="form-amount" required type="number" step="0.01" class="w-full bg-slate-100 border-none rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Due Date</label>
                        <input id="form-date" required type="date" class="w-full bg-slate-100 border-none rounded-xl px-4 py-3 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Category</label>
                    <div id="category-grid" class="grid grid-cols-3 gap-2">
                        <!-- Categories injected here -->
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-xl transition-all">Save Bill Record</button>
            </form>
        </div>
    </div>

    <!-- Export Modal -->
    <div id="export-modal" class="hidden fixed inset-0 z-[110] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl overflow-hidden">
            <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <div class="flex items-center gap-2 text-green-600 font-bold"><i data-lucide="file-spreadsheet" class="w-5 h-5"></i>Export Options</div>
                <button class="export-close"><i data-lucide="x" class="w-5 h-5 text-slate-400"></i></button>
            </div>
            <div class="p-8 space-y-4">
                <div id="export-options" class="space-y-3">
                    <button data-type="current" class="export-opt-btn w-full text-left p-4 rounded-2xl border-2 border-blue-500 bg-blue-50">
                        <p class="font-bold text-sm">Current View</p>
                        <p class="text-xs text-slate-500">Active filters & search results.</p>
                    </button>
                    <button data-type="specific" class="export-opt-btn w-full text-left p-4 rounded-2xl border-2 border-slate-100 hover:bg-slate-50">
                        <p class="font-bold text-sm">Specific Month</p>
                        <input id="export-month-input" type="month" class="w-full mt-2 bg-white border border-slate-200 rounded-lg p-2 text-sm outline-none hidden">
                    </button>
                    <button data-type="all" class="export-opt-btn w-full text-left p-4 rounded-2xl border-2 border-slate-100 hover:bg-slate-50">
                        <p class="font-bold text-sm">All Time History</p>
                    </button>
                </div>
                <button id="btn-execute-export" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-2xl shadow-xl transition-all flex items-center justify-center gap-2 mt-4">
                    <i data-lucide="download" class="w-5 h-5"></i>Download CSV
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs: Imported as ES Modules from Google's CDN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 1. FIREBASE CONFIGURATION
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyACUol8bVd9xlNbCLOUXnbAMdtpuTkRxoA",
                authDomain: "tracker-d3ced.firebaseapp.com",
                projectId: "tracker-d3ced",
                storageBucket: "tracker-d3ced.firebasestorage.app",
                messagingSenderId: "849528900195",
                appId: "1:849528900195:web:d94adc707e5fca28afc656"
            };

        // 2. INITIALIZE SERVICES
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'bill-tracker-v1';

        // --- Application State ---
        let state = {
            user: null,
            bills: [],
            filterStatus: 'all',
            searchTerm: '',
            monthFilter: '',
            currency: { code: 'PHP', symbol: '₱' }, // Swapped to PHP as default
            selectedCategory: 'utilities',
            exportType: 'current'
        };

        const CATEGORIES = [
            { id: 'utilities', name: 'Utilities', color: 'bg-blue-500', icon: '🚰' },
            { id: 'rent', name: 'Rent', color: 'bg-purple-500', icon: '🏠' },
            { id: 'subscriptions', name: 'Subs', color: 'bg-red-500', icon: '📺' },
            { id: 'insurance', name: 'Insurance', color: 'bg-green-500', icon: '🛡️' },
            { id: 'loans', name: 'Loans', color: 'bg-yellow-500', icon: '💳' },
            { id: 'other', name: 'Other', color: 'bg-gray-500', icon: '📦' },
        ];

        // 3. AUTHENTICATION INTEGRATION
        window.onload = async () => {
            const initAuth = async () => {
                // Priority: Secure Token for Platform > Otherwise wait for user interaction
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    // Standard apps would call signInAnonymously(auth) here for immediate access
                }
            };
            initAuth().catch(err => console.error("Firebase Auth Error:", err));

            onAuthStateChanged(auth, (user) => {
                state.user = user;
                document.getElementById('loading-screen').classList.add('hidden');
                
                if (user) {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app-container').classList.remove('hidden');
                    document.getElementById('user-name').innerText = user.displayName || user.uid.slice(0, 8);
                    
                    if (user.photoURL) {
                        document.getElementById('user-avatar').innerHTML = `<img src="${user.photoURL}" class="w-full h-full object-cover">`;
                    }
                    
                    initDataListener(user.uid);
                } else {
                    document.getElementById('auth-screen').classList.remove('hidden');
                    document.getElementById('app-container').classList.add('hidden');
                }
                lucide.createIcons();
            });

            renderCategoryGrid();
            setupEventListeners();
        };

        function initDataListener(uid) {
            const billsRef = collection(db, 'artifacts', appId, 'users', uid, 'bills');
            onSnapshot(query(billsRef), (snapshot) => {
                state.bills = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAll();
            }, (err) => console.error("Firestore Snapshot Error:", err));
        }

        // --- UI Rendering ---
        function renderAll() {
            renderStats();
            renderBillList();
            lucide.createIcons();
        }

        function renderStats() {
            const unpaid = state.bills.filter(b => !b.paid);
            const total = unpaid.reduce((sum, b) => sum + (parseFloat(b.amount) || 0), 0);
            const overdue = unpaid.filter(b => new Date(b.dueDate) < new Date().setHours(0,0,0,0));

            document.getElementById('stat-total-unpaid').innerText = `${state.currency.symbol}${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('stat-pending-count').innerText = `${unpaid.length} Pending`;
            document.getElementById('stat-overdue-count').innerText = `${overdue.length} Overdue`;
        }

        function renderBillList() {
            let filtered = [...state.bills].sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));

            if (state.filterStatus === 'unpaid') filtered = filtered.filter(b => !b.paid);
            else if (state.filterStatus === 'paid') filtered = filtered.filter(b => b.paid);

            if (state.searchTerm) {
                const term = state.searchTerm.toLowerCase();
                filtered = filtered.filter(b => b.title.toLowerCase().includes(term));
            }

            if (state.monthFilter) {
                filtered = filtered.filter(b => b.dueDate.startsWith(state.monthFilter));
            }

            const container = document.getElementById('bill-list');
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="py-20 text-center">
                        <i data-lucide="credit-card" class="text-slate-300 w-12 h-12 mx-auto mb-4"></i>
                        <h4 class="text-slate-800 font-bold">No records found</h4>
                        <p class="text-slate-500 text-sm">Create a bill entry to start tracking.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            container.innerHTML = filtered.map(bill => {
                const cat = CATEGORIES.find(c => c.id === bill.category) || CATEGORIES[5];
                const isOverdue = !bill.paid && new Date(bill.dueDate) < new Date().setHours(0,0,0,0);
                const dateStr = new Date(bill.dueDate).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
                
                return `
                    <div class="p-5 hover:bg-slate-50 transition-colors flex items-center gap-4 group">
                        <div class="${cat.color} w-12 h-12 rounded-2xl flex items-center justify-center text-xl shadow-inner flex-shrink-0 text-white">${cat.icon}</div>
                        <div class="flex-1 min-w-0 text-left">
                            <div class="flex items-center gap-2">
                                <h4 class="font-bold text-slate-800 truncate">${bill.title}</h4>
                                ${isOverdue ? '<span class="bg-red-100 text-red-600 text-[10px] font-black px-1.5 py-0.5 rounded uppercase">Overdue</span>' : ''}
                            </div>
                            <p class="text-xs text-slate-500">Due ${dateStr}</p>
                        </div>
                        <div class="text-right hidden sm:block">
                            <p class="font-black text-slate-900">${state.currency.symbol}${parseFloat(bill.amount).toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tight">${cat.name}</p>
                        </div>
                        <div class="flex items-center gap-1 ml-4">
                            <button onclick="window.togglePaidStatus('${bill.id}', ${bill.paid})" class="p-2 rounded-lg transition-all ${bill.paid ? 'bg-green-100 text-green-600' : 'bg-slate-100 text-slate-400 hover:bg-blue-50 hover:text-blue-600'}">
                                <i data-lucide="check-circle" class="w-5 h-5"></i>
                            </button>
                            <button onclick="window.openEditModal('${bill.id}')" class="p-2 text-slate-300 hover:text-blue-500 transition-all opacity-0 group-hover:opacity-100">
                                <i data-lucide="edit-2" class="w-5 h-5"></i>
                            </button>
                            <button onclick="window.deleteBillRecord('${bill.id}')" class="p-2 text-slate-300 hover:text-red-500 transition-all opacity-0 group-hover:opacity-100">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function renderCategoryGrid() {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = CATEGORIES.map(cat => `
                <button type="button" data-cat-id="${cat.id}" class="cat-btn py-3 rounded-xl text-[10px] font-bold border-2 transition-all flex flex-col items-center gap-1 ${state.selectedCategory === cat.id ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-transparent bg-slate-100 text-slate-500'}">
                    <span class="text-lg">${cat.icon}</span>
                    ${cat.name}
                </button>
            `).join('');

            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.onclick = () => {
                    state.selectedCategory = btn.dataset.catId;
                    renderCategoryGrid();
                };
            });
        }

        // --- Event Listeners ---
        function setupEventListeners() {
            // LOGIN BUTTON ACTION
            document.getElementById('btn-login').onclick = async () => {
                try {
                    await signInWithPopup(auth, googleProvider);
                } catch (err) {
                    console.error("Login Error:", err);
                    if (err.code === 'auth/unauthorized-domain') {
                        // Fallback for previews that block popups/domains
                        await signInAnonymously(auth);
                    }
                }
            };

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.onclick = () => {
                    state.filterStatus = btn.dataset.filter;
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('bg-blue-50', 'text-blue-700'));
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-slate-600'));
                    btn.classList.add('bg-blue-50', 'text-blue-700');
                    document.getElementById('view-indicator').innerText = `Viewing ${state.filterStatus.charAt(0).toUpperCase() + state.filterStatus.slice(1)} Bills`;
                    renderBillList();
                    if (window.innerWidth < 1024) document.getElementById('sidebar').classList.add('-translate-x-full');
                };
            });

            document.querySelectorAll('.curr-btn').forEach(btn => {
                btn.onclick = () => {
                    state.currency = btn.dataset.curr === 'USD' ? {code:'USD', symbol:'$'} : {code:'PHP', symbol:'₱'};
                    document.querySelectorAll('.curr-btn').forEach(b => b.classList.remove('bg-white', 'shadow-sm', 'text-blue-600'));
                    document.querySelectorAll('.curr-btn').forEach(b => b.classList.add('text-slate-50'));
                    btn.classList.add('bg-white', 'shadow-sm', 'text-blue-600');
                    btn.classList.remove('text-slate-500');
                    renderAll();
                };
            });

            document.getElementById('search-input').oninput = (e) => {
                state.searchTerm = e.target.value;
                renderBillList();
            };
            document.getElementById('month-filter').onchange = (e) => {
                state.monthFilter = e.target.value;
                renderBillList();
            };

            document.getElementById('btn-add-bill').onclick = () => {
                document.getElementById('modal-title').innerText = "New Bill Entry";
                document.getElementById('edit-id').value = "";
                document.getElementById('bill-form').reset();
                state.selectedCategory = 'utilities';
                renderCategoryGrid();
                document.getElementById('bill-modal').classList.remove('hidden');
            };
            document.querySelectorAll('.modal-close').forEach(b => b.onclick = () => document.getElementById('bill-modal').classList.add('hidden'));

            document.getElementById('bill-form').onsubmit = async (e) => {
                e.preventDefault();
                const editId = document.getElementById('edit-id').value;
                const data = {
                    title: document.getElementById('form-title').value,
                    amount: parseFloat(document.getElementById('form-amount').value),
                    dueDate: document.getElementById('form-date').value,
                    category: state.selectedCategory,
                    updatedAt: new Date().toISOString()
                };

                const colRef = collection(db, 'artifacts', appId, 'users', state.user.uid, 'bills');
                if (editId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'bills', editId), data);
                } else {
                    await addDoc(colRef, { ...data, paid: false, createdAt: new Date().toISOString() });
                }
                document.getElementById('bill-modal').classList.add('hidden');
            };

            document.getElementById('btn-menu').onclick = () => document.getElementById('sidebar').classList.remove('-translate-x-full');
            document.getElementById('btn-logout').onclick = () => signOut(auth);

            document.getElementById('btn-open-export').onclick = () => document.getElementById('export-modal').classList.remove('hidden');
            document.querySelectorAll('.export-close').forEach(b => b.onclick = () => document.getElementById('export-modal').classList.add('hidden'));

            document.querySelectorAll('.export-opt-btn').forEach(btn => {
                btn.onclick = () => {
                    state.exportType = btn.dataset.type;
                    document.querySelectorAll('.export-opt-btn').forEach(b => b.classList.remove('border-blue-500', 'bg-blue-50'));
                    document.querySelectorAll('.export-opt-btn').forEach(b => b.classList.add('border-slate-100'));
                    btn.classList.add('border-blue-500', 'bg-blue-50');
                    document.getElementById('export-month-input').classList.toggle('hidden', state.exportType !== 'specific');
                };
            });

            document.getElementById('btn-execute-export').onclick = () => {
                let list = [];
                let name = 'bills_export';

                if (state.exportType === 'current') {
                    let filtered = [...state.bills].sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
                    if (state.filterStatus === 'unpaid') filtered = filtered.filter(b => !b.paid);
                    else if (state.filterStatus === 'paid') filtered = filtered.filter(b => b.paid);
                    if (state.searchTerm) filtered = filtered.filter(b => b.title.toLowerCase().includes(state.searchTerm.toLowerCase()));
                    if (state.monthFilter) filtered = filtered.filter(b => b.dueDate.startsWith(state.monthFilter));
                    list = filtered;
                    name += '_filtered';
                } else if (state.exportType === 'specific') {
                    const m = document.getElementById('export-month-input').value;
                    if (!m) return;
                    list = state.bills.filter(b => b.dueDate.startsWith(m));
                    name += `_${m}`;
                } else {
                    list = state.bills;
                    name += '_all';
                }

                if (list.length === 0) return;

                const csv = [['Title', 'Amount', 'Currency', 'Due Date', 'Category', 'Status'], 
                    ...list.map(b => [
                        `"${b.title}"`, b.amount, state.currency.code, b.dueDate, 
                        CATEGORIES.find(c => c.id === b.category)?.name, b.paid ? 'Paid' : 'Unpaid'
                    ])].map(e => e.join(",")).join("\n");

                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `${name}.csv`;
                a.click();
                document.getElementById('export-modal').classList.add('hidden');
            };
        }

        // --- Global Helpers ---
        window.togglePaidStatus = async (id, currentStatus) => {
            await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'bills', id), { paid: !currentStatus });
        };

        window.deleteBillRecord = async (id) => {
            if (confirm("Delete this bill record?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'bills', id));
            }
        };

        window.openEditModal = (id) => {
            const bill = state.bills.find(b => b.id === id);
            if (!bill) return;
            document.getElementById('modal-title').innerText = "Edit Bill Details";
            document.getElementById('edit-id').value = id;
            document.getElementById('form-title').value = bill.title;
            document.getElementById('form-amount').value = bill.amount;
            document.getElementById('form-date').value = bill.dueDate;
            state.selectedCategory = bill.category;
            renderCategoryGrid();
            document.getElementById('bill-modal').classList.remove('hidden');
        };
    </script>
</body>
</html>
